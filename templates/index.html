
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>

        Translify AI

    </title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="blob blob1"></div>

<div class="blob blob2"></div>

<div class="blob blob3"></div>

    <div class="container">

        <!-- HEADER -->

        <div class="header-row">

            <div class="header">

                <h1>

                    🌍 Translify AI

                </h1>

                <p>

                    🟢 AI Online • Translate • Detect • Listen

                </p>

            </div>

            <button id="themeButton">

                🌙

            </button>

        </div>


        <!-- MAIN LAYOUT -->

        <div class="main-layout">


            <!-- LEFT PANEL -->

            <div class="card">

                <div class="editor-grid">

                    <div>

                        <h2>

                            Enter Text

                        </h2>

                        <textarea

                            id="inputText"

                            placeholder="Type something here...">

                        </textarea>

                    </div>


                    <div>

                        <h2>

                            Translation

                        </h2>

                        <textarea

                            id="outputText"

                            readonly

                            placeholder="Translation will appear here...">

                        </textarea>

                    </div>

                </div>


                <div class="language-row">

                    <select id="sourceLang">

                        <option>Auto Detect</option>
                        <option>English</option>
                        <option>Hindi</option>
                        <option>Marathi</option>
                        <option>French</option>
                        <option>German</option>
                        <option>Spanish</option>

                    </select>


                    <button class="swap">

                        🔄

                    </button>


                    <select id="targetLang">

                        <option>English</option>
                        <option>Hindi</option>
                        <option>Marathi</option>
                        <option>French</option>
                        <option>German</option>
                        <option>Spanish</option>

                    </select>

                </div>


            
<div class="buttons">

    <button class="translate">

        🚀 Translate

    </button>

    <button class="copy">

        📋 Copy

    </button>

    <button class="clear">

        🗑 Clear

    </button>

    <button class="speak">

        🔊 Speak

    </button>

    <button id="voiceButton">

        🎤 Voice

    </button>

</div>



                <div class="counter">

                    Characters :

                    <span id="charCount">

                        0

                    </span>

                </div>

            </div>


            <!-- RIGHT PANEL -->

            <div class="history-side">

                <div class="history-header">

    <h2>

        📜 Recent History

    </h2>

    <div>

        <button id="toggleHistory">

            ◀

        </button>

        <button id="clearHistory">

            🗑

        </button>

    </div>

</div>

                <div id="historyBox">

                </div>

            </div>

        </div>

    </div>


    <div id="toast"></div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
<footer>

    <p>

        🌍 Translify AI

    </p>

    <p>

        Powered by Flask • Deep Translator

    </p>

    <p>

        Developed by Ankeshwar Yadav © 2026

    </p>

</footer>
</body>

</html>
